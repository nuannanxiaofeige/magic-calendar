version: '3.8'

services:
  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - ./server/.env.dev
    environment:
      # 环境变量优先级高于 env_file，可覆盖
      - DB_HOST=mysql
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - chronos-net

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-rootpassword}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-chronos_eye}"
      MYSQL_USER: "${MYSQL_USER:-chronos_user}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-dev_password_change_me}"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/create-db-user.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - chronos-net

volumes:
  mysql-data:

networks:
  chronos-net:
    driver: bridge
